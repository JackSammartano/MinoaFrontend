<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login · Minoa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/minoa-theme.css">
  <style>
    body { min-height: 100vh; margin: 0; }
    .login-wrap { min-height: 100vh; display: grid; grid-template-columns: 1.1fr 1fr; }
    @media (max-width: 900px) { .login-wrap { grid-template-columns: 1fr; } .login-hero { display: none; } }
    .login-hero {
      background: oklch(0.30 0.04 55); color: oklch(0.95 0.01 80);
      padding: 60px; display: flex; flex-direction: column; justify-content: space-between;
      position: relative; overflow: hidden;
    }
    .login-hero::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 600px 400px at 80% 20%, color-mix(in oklch, var(--accent) 30%, transparent), transparent 70%);
      pointer-events: none;
    }
    .login-hero > * { position: relative; z-index: 1; }
    .login-hero .brand-line { display: flex; align-items: center; gap: 10px; }
    .login-hero .brand-line .mark { width: 36px; height: 36px; border-radius: 8px; background: var(--accent); display: grid; place-items: center; font-family: var(--font-display); font-size: 22px; font-style: italic; color: #fff; }
    .login-hero h1 { font-size: 56px; line-height: 1.02; font-weight: 400; color: inherit; margin: 0; }
    .login-hero h1 em { color: var(--accent); font-style: italic; }
    .login-hero .tag { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: oklch(0.85 0.02 80); opacity: .8; margin-bottom: 18px; }
    .login-hero .desc { font-size: 15px; line-height: 1.55; opacity: .85; margin-top: 20px; max-width: 440px; }
    .login-form-wrap { display: grid; place-items: center; padding: 40px; }
    .login-form { width: 100%; max-width: 360px; }
    .login-form h2 { font-size: 36px; margin: 4px 0 28px; }
    .error-msg { color: var(--danger); font-size: 12.5px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-hero">
    <div class="brand-line">
      <div class="mark">M</div>
      <div class="font-display" style="font-size:24px">Minoa</div>
    </div>

    <div>
      <div class="tag">Sala &amp; Eventi / dal 1987</div>
      <h1>La sala è un <em>mestiere</em>.<br/>Noi ti diamo gli <em>strumenti</em>.</h1>
      <p class="desc">Eventi, turni, camerieri — in un unico posto. Creato per banchetti, matrimoni e catering.</p>
    </div>

    <div style="font-size:11px; opacity:.7; letter-spacing:.06em">© 2026 Minoa · v2.4</div>
  </div>

  <div class="login-form-wrap">
    <form id="loginForm" class="login-form">
      <div class="form-label" style="margin-bottom:4px">Accesso gestionale</div>
      <h2 class="font-display">Bentornato.</h2>

      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input id="username" type="text" class="form-control" required autofocus>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center">
          <label for="password" class="form-label">Password</label>
          <a href="#" class="form-label" style="color:var(--accent-ink); text-decoration:none">Dimenticata?</a>
        </div>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-accent w-100 py-2 mt-2">Accedi</button>
      <p id="error" class="error-msg text-center" style="display:none"></p>
    </form>
  </div>
</div>

<script src="../js/bootstrap.bundle.min.js"></script>
<script type="module" src="login.js"></script>
</body>
</html>
