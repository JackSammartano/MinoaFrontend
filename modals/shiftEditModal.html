<div class="modal fade" id="shiftEditModal" tabindex="-1" aria-labelledby="shiftEditModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title font-display" id="shiftEditModalLabel">Modifica Turno</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
      </div>
      <div class="modal-body">

        <!-- SEZIONE 1: Metadati evento -->
        <div class="stat-label mb-3">Dati Evento</div>
        <form id="shiftMetaForm">
          <div class="row g-2 mb-2">
            <div class="col-8">
              <label class="form-label">Nome</label>
              <input class="form-control" id="shiftName" required />
            </div>
            <div class="col-4">
              <label class="form-label">Data</label>
              <input type="date" class="form-control" id="shiftDate" required />
            </div>
          </div>
          <div class="row g-2 mb-3">
            <div class="col">
              <label class="form-label">Orario</label>
              <select class="form-select" id="shiftMealType">
                <option value="MATTINA">Mattina</option>
                <option value="SERA">Sera</option>
              </select>
            </div>
            <div class="col">
              <label class="form-label">Location</label>
              <select class="form-select" id="shiftLocation">
                <option value="MINOA">Minoa</option>
                <option value="COLORADO">Colorado</option>
                <option value="CATERING">Catering</option>
              </select>
            </div>
            <div class="col">
              <label class="form-label">Tipo Evento</label>
              <select class="form-select" id="shiftType">
                <option value="MATRIMONIO">Matrimonio</option>
                <option value="BANCHETTO">Banchetto</option>
              </select>
            </div>
            <div class="col">
              <label class="form-label">Coperti</label>
              <input type="number" class="form-control" id="shiftDiners" min="1" required />
            </div>
          </div>
          <button type="submit" class="btn btn-outline-secondary btn-sm" id="btnSaveMeta">
            <i class="bi bi-floppy"></i> Salva dati evento
          </button>
        </form>

        <hr class="my-4">

        <!-- SEZIONE 2: Camerieri (operazioni immediate) -->
        <div class="stat-label mb-3">Camerieri nel turno</div>
        <ul id="assignedWaitersList" class="list-group mb-3"></ul>
        <div class="d-flex gap-2 align-items-center">
          <select id="addWaiterSelect" class="form-select form-select-sm" style="max-width:280px">
            <option value="">-- aggiungi cameriere --</option>
          </select>
          <button class="btn btn-sm btn-outline-primary" id="btnAddWaiter">
            <i class="bi bi-plus-lg"></i> Aggiungi
          </button>
        </div>

        <hr class="my-4">

        <!-- SEZIONE 3: Split (collassabile) -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="splitShiftCheckbox">
          <label class="form-check-label" for="splitShiftCheckbox" style="font-weight:500">
            Dividi Turno
          </label>
        </div>
        <div id="splitShiftSection" class="d-none">
          <h6 class="mb-2">Evento Principale</h6>
          <div id="principalEventForm"></div>
          <h6 class="mt-4 mb-2">Nuovo Evento</h6>
          <div id="secondEventForm"></div>
          <button class="btn btn-accent mt-3" id="btnSplit">
            <i class="bi bi-scissors"></i> Esegui Divisione
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
